services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - apps/api/.env
    environment:
      HOST: 0.0.0.0
      NODE_OPTIONS: --dns-result-order=ipv4first
      DATABASE_URL: postgresql://whencheap:whencheap@postgres:5432/whencheap
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    ports:
      - "3830:3001"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:3001}
        NEXT_PUBLIC_CHAIN_ID: ${NEXT_PUBLIC_CHAIN_ID:-11155111}
        NEXT_PUBLIC_WALLETCONNECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_ID:-}
        NEXT_PUBLIC_SESSION_CONTRACT: ${NEXT_PUBLIC_SESSION_CONTRACT:-}
    env_file:
      - apps/frontend/.env
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
    ports:
      - "3829:3000"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: whencheap
      POSTGRES_PASSWORD: whencheap
      POSTGRES_DB: whencheap
    ports:
      - "3831:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "3832:6379"

volumes:
  postgres_data:
